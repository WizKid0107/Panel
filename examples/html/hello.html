<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Hello</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0c0f14;
      color: #edf3f7;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 0%, rgba(146, 117, 255, 0.18), transparent 24rem),
        linear-gradient(135deg, #0c0f14, #151922 62%, #080a0e);
    }
    main {
      width: min(92vw, 720px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 28px;
      background: rgba(13, 17, 24, 0.82);
      box-shadow: 0 28px 90px rgba(0,0,0,0.36);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.96;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      max-width: 58ch;
      color: #a7b2c3;
      font-size: 18px;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>Panel is running.</h1>
    <p>A terminal agent can open visual artifacts here instead of squeezing everything into text.</p>
  </main>
</body>
</html>
